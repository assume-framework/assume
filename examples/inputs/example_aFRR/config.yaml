# Sequential aFRR + EOM scenario (German design):
#   1. aFRR_cap_pos / aFRR_cap_neg auction opens first (4h block, opens daily)
#   2. EOM (day-ahead) opens next                       (hourly)
#   3. aFRR_en_pos / aFRR_en_neg opens last             (hourly, must-offer + voluntary)
#
# A unit that wins aFRR capacity is obliged to bid the won volume on the
# matching aFRR energy market (must-offer). Units may also bid voluntary
# aFRR energy without holding capacity.

aFRR_demo:
  start_date: 2019-01-01 00:00
  end_date: 2019-01-03 00:00          # 2 days for a quick smoke test
  time_step: 1h
  save_frequency_hours: 24

  # Passed to every strategy as **kwargs at construction time.
  bidding_strategy_params:
    eom_foresight: 12h
    activation_probability: 0.05
    capacity_price_floor: 0.0
    voluntary_markup: 0.0
    voluntary_discount: 0.0
    delivery_duration_hours: 1.0
    eom_market_id: EOM
    afrr_energy_market_id_pos: aFRR_en_pos
    afrr_energy_market_id_neg: aFRR_en_neg

  markets_config:

    # ---- aFRR CAPACITY (4h blocks) ---------------------------------------
    aFRR_cap_pos:
      operator: aFRR_operator
      product_type: capacity_pos
      start_date: 2019-01-01 00:00
      products:
        - duration: 4h
          count: 1
          first_delivery: 4h
      opening_frequency: 4h
      opening_duration: 1h
      volume_unit: MW
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: 0
      price_unit: EUR/MW
      market_mechanism: pay_as_clear

    # aFRR_cap_neg opens 1h AFTER aFRR_cap_pos so neg strategies see the pos
    # commitment when they bid. Without staggering, both markets open at the
    # same sim time, the units bid independently, and the same headroom gets
    # double-committed -- leaving the unit infeasible in EOM.
    aFRR_cap_neg:
      operator: aFRR_operator
      product_type: capacity_neg
      start_date: 2019-01-01 01:00
      products:
        - duration: 4h
          count: 1
          first_delivery: 3h
      opening_frequency: 4h
      opening_duration: 1h
      volume_unit: MW
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: 0
      price_unit: EUR/MW
      market_mechanism: pay_as_clear

    # ---- EOM (day-ahead, hourly) -----------------------------------------
    # Opens AFTER aFRR cap. With start_date offset by 2h and first_delivery 2h,
    # the EOM auction at 02:00 clears for delivery at 04:00 (same hour as the
    # first aFRR cap block delivery). EOM sees capacity_pos/neg already
    # populated and respects them via PowerPlant.calculate_min_max_power.
    EOM:
      operator: EOM_operator
      product_type: energy
      start_date: 2019-01-01 02:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 2h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear

    # ---- aFRR ENERGY (hourly, runs LAST so cap + EOM are both committed) -
    aFRR_en_pos:
      operator: aFRR_operator
      product_type: energy_pos
      start_date: 2019-01-01 03:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear

    aFRR_en_neg:
      operator: aFRR_operator
      product_type: energy_neg
      start_date: 2019-01-01 03:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear
