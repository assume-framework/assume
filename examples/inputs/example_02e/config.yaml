base:
  start_date: 2019-03-01 00:00
  end_date: 2019-03-31 00:00
  time_step: 1h
  save_frequency_hours: null
  seed: null
  shared_learning_config:
	    training_episodes: 100
	    device: cpu
	    validation_episodes_interval: 5
	    episodes_collecting_initial_experience: 5
	    Early_stopping: #neu formuliert wie zwei level händelt
  units_config:
	  learning_config:
	    learning_mode: true
	    continue_learning: false
	    trained_policies_save_path: null
	    trained_policies_load_path: null
	    max_bid_price: 100
	    algorithm: MATD3
	    learning_rate: 0.001
	    train_freq: 100h
	    gradient_steps: 10
	    batch_size: 128
	    gamma: 0.99
	    action_noise_schedule: linear
	    noise_sigma: 0.1
	    noise_scale: 1
	    noise_dt: 1
  markets_config:
    EOM:
      operator: EOM_operator
      product_type: energy
      start_date: 2019-03-01 00:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear
      learning_config:
        learning_mode: true
        continue_learning: false
        strategy: market_learning
        trained_policies_save_path: null
        trained_policies_load_path: null
        max_bid_price: 100
        algorithm: matd3
        learning_rate: 0.001
        train_freq: 100h
        gradient_steps: 10
        batch_size: 128
        gamma: 0.99
        action_noise_schedule: linear
        noise_sigma: 0.1
        noise_scale: 1
        noise_dt: 1
