cement_plant_case:
  start_date: 2019-01-01 00:00
  end_date: 2019-01-07 23:00
  time_step: 1h
  save_frequency_hours: 24

  bidding_strategy_params:
    crm_foresight: 4h

  markets_config:
    EOM:
      start_date: 2019-01-01 00:00
      operator: EOM_operator
      product_type: energy
      products:
      - duration: 1h
        count: 24
        first_delivery: 24h
      opening_frequency: 24h
      opening_duration: 20h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear

    # Long Term Market - 7d contracts
    LTM_OTC:
      operator: LTM_operator
      product_type: energy
      start_date: 2019-01-01 00:00
      products:
        - duration: 7d
          count: 1
          first_delivery: 2h
      opening_frequency: 7d
      opening_duration: 1h
      volume_unit: MW
      maximum_volume: 1000000
      price_unit: EUR/MW
      market_mechanism: pay_as_bid

    CRM_pos:
      operator: CRM_operator
      product_type: capacity_pos
      start_date: 2019-01-01 00:00
      products:
        - duration: 4h
          count: 1
          first_delivery: 1h
      opening_frequency: 4h
      opening_duration: 1h
      volume_unit: MW
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MW
      market_mechanism: pay_as_bid

    CRM_neg:
      operator: CRM_operator
      product_type: capacity_neg
      start_date: 2019-01-01 00:00
      products:
        - duration: 4h
          count: 1
          first_delivery: 1h
      opening_frequency: 4h
      opening_duration: 1h
      volume_unit: MW
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MW
      market_mechanism: pay_as_bid
