base_case:
  start_date: 2019-01-01 00:00
  end_date: 2019-01-31 23:45
  time_step: 30min
  learning_mode: False
  save_frequency_hours: False
  
  markets_config:
    EOM:
      operator: EOM_operator
      product_type: energy
      start_date: 2019-01-01 00:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 30min
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear
      #additional_fields:
      #  - node
      #  - bid_type
      #param_dict:
      #  network_path: .
      #  zones_identifier: zone_id

    Redispatch:
      operator: Redispatch_operator
      product_type: energy
      start_date: 2019-01-01 00:30
      products:
        - duration: 1h
          count: 1
          first_delivery: 30min
      opening_frequency: 1h
      opening_duration: 30min
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: redispatch
      additional_fields:
        - node
        - min_power
        - max_power
      param_dict:
        network_path: .
        solver: glpk
        payment_mechanism: pay_as_bid
        backup_marginal_cost: 10000


learning_coal:
  start_date: 2019-01-01 00:00
  end_date: 2019-01-31 23:45
  time_step: 30min
  learning_config:
    algorithm: matd3
    batch_size: 256
    continue_learning: False
    device: cpu
    episodes_collecting_initial_experience: 5
    gamma: 0.99
    gradient_steps: -1
    learning_rate: 0.001
    max_bid_price: 100
    noise_dt: 1
    noise_scale: 1
    noise_sigma: 0.1
    train_freq: 4h
    trained_policies_save_path: avg_reward_eval_policies\last_policies
    training_episodes: 10
    validation_episodes_interval: 5
  learning_mode: True
  save_frequency_hours: null
  
  markets_config:
    EOM:
      operator: EOM_operator
      product_type: energy
      start_date: 2019-01-01 00:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 30min
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear
      #additional_fields:
      #  - node
      #  - bid_type
      #param_dict:
      #  network_path: .
      #  zones_identifier: zone_id

    Redispatch:
      operator: Redispatch_operator
      product_type: energy
      start_date: 2019-01-01 00:30
      products:
        - duration: 1h
          count: 1
          first_delivery: 30min
      opening_frequency: 1h
      opening_duration: 30min
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: redispatch
      additional_fields:
        - node
        - min_power
        - max_power
      param_dict:
        network_path: .
        solver: glpk
        payment_mechanism: pay_as_bid
        backup_marginal_cost: 10000

