base_case_2045:
  start_date: 2045-01-01 00:00
  end_date: 2045-12-31 23:00
  time_step: 1h
  save_frequency_hours: 24

  bidding_strategy_params:
    eom_market_id: EOM
    crm_energy_market_id_pos: CRM_energy_pos
    crm_energy_market_id_neg: CRM_energy_neg

  markets_config:
    CRM_capacity_pos:
      operator: regelleistung_de-lu
      product_type: capacity_pos
      start_date: 2045-01-01 00:00
      products:
        - duration: 4h
          count: 6                       # six 4h blocks 00-04..20-24 of day D
          first_delivery: 24h
      opening_frequency: 24h             # single daily auction (real German aFRR)
      opening_duration: 8h               # gate closes 08:00 D-1, before day-ahead
      volume_unit: MW
      maximum_bid_volume: 100000
      minimum_bid_volume: 0              # aFRR min bid size rule disabled (all units may bid)
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MW
      market_mechanism: pay_as_bid

    CRM_capacity_neg:
      operator: regelleistung_de-lu
      product_type: capacity_neg
      start_date: 2045-01-01 00:00
      products:
        - duration: 4h
          count: 6
          first_delivery: 24h
      opening_frequency: 24h
      opening_duration: 8h
      volume_unit: MW
      maximum_bid_volume: 100000
      minimum_bid_volume: 0              # aFRR min bid size rule disabled (all units may bid)
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MW
      market_mechanism: pay_as_bid

    # CRM energy (activation): must-offer for capacity winners + voluntary,
    # priced via PowerPlantCrmPosStrategy/NegStrategy. Opens once daily, after
    # EOM's ~20:00 clearing and the day's CRM capacity blocks, clearing hourly
    # products for the next day -- mirrors redispatch's own "single evening
    # opening covers next day's 24 hourly products" convention below.
    CRM_energy_pos:
      operator: regelleistung_de-lu
      product_type: energy_pos
      start_date: 2045-01-01 23:00
      products:
        - duration: 1h
          count: 24
          first_delivery: 1h
      opening_frequency: 24h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      minimum_bid_volume: 0              # aFRR min bid size rule disabled (all units may bid)
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MWh
      market_mechanism: pay_as_bid

    CRM_energy_neg:
      operator: regelleistung_de-lu
      product_type: energy_neg
      start_date: 2045-01-01 23:00
      products:
        - duration: 1h
          count: 24
          first_delivery: 1h
      opening_frequency: 24h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      minimum_bid_volume: 0              # aFRR min bid size rule disabled (all units may bid)
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MWh
      market_mechanism: pay_as_bid

    EOM:
      start_date: 2045-01-01 00:00
      operator: EOM_operator
      product_type: energy
      products:
        - duration: 1h
          count: 24
          first_delivery: 24h
      opening_frequency: 24h
      opening_duration: 12h              # day-ahead gate ~12:00 D-1
      volume_unit: MWh
      maximum_bid_volume: 100000
      minimum_bid_volume: 0           # EPEX day-ahead minimum bid size 0.1 MW
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear

    redispatch:
      start_date: 2045-01-01 21:00
      operator: network_operator
      product_type: energy
      products:
        - duration: 1h
          count: 24
          first_delivery: 3h
      opening_frequency: 24h
      opening_duration: 2h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: redispatch
      additional_fields:
        - node
        - min_power
        - max_power
      param_dict:
        network_path: .
        solver: highs
        payment_mechanism: pay_as_bid
        backup_marginal_cost: 10000
        export_dir: outputs/pypsa_nc
        log_line_loading: true

