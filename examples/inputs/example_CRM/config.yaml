# Sequential CRM + EOM scenario (German control-reserve design):
#   1. CRM_capacity_pos / CRM_capacity_neg auction opens first (4h block, opens daily)
#   2. EOM (day-ahead) opens next                              (hourly)
#   3. CRM_energy_pos / CRM_energy_neg opens last              (hourly, must-offer + voluntary)
#
# A unit that wins CRM capacity is obliged to bid the won volume on the
# matching CRM energy market (must-offer). Units may also bid voluntary
# CRM energy without holding capacity.

CRM_demo:
  start_date: 2019-01-01 00:00
  end_date: 2019-01-03 00:00          # 2 days for a quick smoke test
  time_step: 1h
  save_frequency_hours: 24

  # Passed to every strategy as **kwargs at construction time.
  bidding_strategy_params:
    eom_foresight: 12h
    eom_market_id: EOM
    crm_energy_market_id_pos: CRM_energy_pos
    crm_energy_market_id_neg: CRM_energy_neg

  markets_config:

    # ---- CRM CAPACITY (4h blocks) ----------------------------------------
    CRM_capacity_pos:
      operator: CRM_operator
      product_type: capacity_pos
      start_date: 2019-01-01 00:00
      products:
        - duration: 4h
          count: 1
          first_delivery: 4h
      opening_frequency: 4h
      opening_duration: 1h
      volume_unit: MW
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: 0
      price_unit: EUR/MW
      market_mechanism: pay_as_clear

    # CRM_capacity_neg opens 1h AFTER CRM_capacity_pos so neg strategies see the
    # pos commitment when they bid. Without staggering, both markets open at the
    # same sim time, the units bid independently, and the same headroom gets
    # double-committed -- leaving the unit infeasible in EOM.
    CRM_capacity_neg:
      operator: CRM_operator
      product_type: capacity_neg
      start_date: 2019-01-01 01:00
      products:
        - duration: 4h
          count: 1
          first_delivery: 3h
      opening_frequency: 4h
      opening_duration: 1h
      volume_unit: MW
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: 0
      price_unit: EUR/MW
      market_mechanism: pay_as_clear

    # ---- EOM (day-ahead, hourly) -----------------------------------------
    # Opens AFTER CRM capacity. With start_date offset by 2h and first_delivery 2h,
    # the EOM auction at 02:00 clears for delivery at 04:00 (same hour as the
    # first CRM capacity block delivery). EOM sees capacity_pos/neg already
    # populated and respects them via PowerPlant.calculate_min_max_power.
    EOM:
      operator: EOM_operator
      product_type: energy
      start_date: 2019-01-01 02:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 2h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear

    # ---- CRM ENERGY (hourly, runs LAST so capacity + EOM are both committed) -
    CRM_energy_pos:
      operator: CRM_operator
      product_type: energy_pos
      start_date: 2019-01-01 03:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear

    CRM_energy_neg:
      operator: CRM_operator
      product_type: energy_neg
      start_date: 2019-01-01 03:00
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 9999
      minimum_bid_price: -9999
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear
