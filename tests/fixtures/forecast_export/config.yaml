base:
  start_date: 2019-01-01 00:00
  end_date: 2019-01-02 00:00
  time_step: 1h
  save_frequency_hours: 720

  markets_config:
    EOM:
      operator: EOM_operator
      product_type: energy
      products:
        - duration: 1h
          count: 1
          first_delivery: 1h
      opening_frequency: 1h
      opening_duration: 1h
      volume_unit: MWh
      maximum_bid_volume: 100000
      maximum_bid_price: 3000
      minimum_bid_price: -500
      price_unit: EUR/MWh
      market_mechanism: pay_as_clear

  # Defaults for every unit; single units override these in their unit csv.
  forecast_algorithms:
    price: price_naive_forecast
    residual_load: residual_load_naive_forecast
    preprocess_price: price_default
    preprocess_residual_load: residual_load_default
    update_price: price_default
    update_residual_load: residual_load_default
