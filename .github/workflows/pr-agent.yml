name: PR Agent
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, review_requested]
  issue_comment:
jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' && (github.event_name == 'pull_request' || github.event.issue.pull_request) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent action step
        uses: the-pr-agent/pr-agent@v0.39.0
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI__API_BASE: "https://chat.kiconnect.nrw/api/v1"
          config.model: "openai/gpt-5.5"
          config.publish_labels: "true"
          config.fallback_models: '["openai/gpt-5.4", "openai/openai-gpt-oss-120b"]'
          config.custom_model_max_tokens: "128000"
          config.publish_description_as_comment: "true"
          config.output_relevant_configurations: "true"
          config.final_update_message: false
          github_action_config.pr_actions: '["opened", "reopened", "synchronize", "ready_for_review", "review_requested"]'
          github_action_config.auto_review: "false"
